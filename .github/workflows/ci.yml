name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Rust)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: klima
          POSTGRES_USER: klima
          POSTGRES_PASSWORD: klima
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: back

      - name: Check
        working-directory: back
        run: cargo check --all-targets

      - name: Clippy
        working-directory: back
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        working-directory: back
        run: cargo test --all-targets
        env:
          DATABASE_URL: postgres://klima:klima@localhost:5432/klima

  frontend:
    name: Frontend (Vue/Quasar)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: front/package-lock.json

      - name: Install
        working-directory: front
        run: npm ci

      - name: Type check
        working-directory: front
        run: npx vue-tsc --noEmit

  training:
    name: Training (Python syntax)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate Python syntax
        run: python3 scripts/check_python_syntax.py
