name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: back

      - name: Check
        working-directory: back
        run: cargo check --all-targets

      - name: Clippy
        working-directory: back
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        working-directory: back
        run: cargo test --all-targets
        env:
          DATABASE_URL: postgres://klima:klima@localhost:5432/klima

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: klima
          POSTGRES_USER: klima
          POSTGRES_PASSWORD: klima
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

  frontend:
    name: Frontend (Vue/Quasar)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: front/package-lock.json

      - name: Install
        working-directory: front
        run: npm ci

      - name: Type check
        working-directory: front
        run: npx vue-tsc --noEmit

  training:
    name: Training (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Syntax check
        run: python -c "
          import ast, os, sys;
          errors = [];
          [errors.append(f'{os.path.join(r,f)}: {e}')
           for r, _, fs in os.walk('training/src')
           for f in fs if f.endswith('.py')
           for e in [None]
           if (e := (lambda p: (ast.parse(open(p).read()), None)[-1] if True else None)(os.path.join(r,f))) is not None
          ] if False else None;
          ok = True;
          [print(f'OK') for _ in range(1)]
          "
        shell: bash

      - name: Validate Python syntax
        run: |
          python3 -c "
          import ast, os, sys
          errors = []
          for root, dirs, files in os.walk('training/src'):
              dirs[:] = [d for d in dirs if d != '__pycache__']
              for f in files:
                  if f.endswith('.py'):
                      path = os.path.join(root, f)
                      try:
                          with open(path) as fh:
                              ast.parse(fh.read())
                      except SyntaxError as e:
                          errors.append(f'{path}: {e}')
          if errors:
              for e in errors:
                  print(f'ERROR: {e}', file=sys.stderr)
              sys.exit(1)
          print(f'All Python files OK')
          "
