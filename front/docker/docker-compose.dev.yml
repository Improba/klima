name: klima

services:
  klima-front:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    container_name: klima-front
    env_file:
      - path: ../../.env
        required: false
    ports:
      - "9000:9000"
    volumes:
      - ../:/app
      - node-modules:/app/node_modules
    # Ne pas mettre VITE_CESIUM_ION_TOKEN=${CESIUM_ION_TOKEN} ici : Compose interpole sur l’hôte
    # (souvent vide si .env n’est pas exporté dans le shell). Le Dockerfile copie CESIUM_ION_TOKEN
    # → VITE_* au démarrage du conteneur (env_file racine fournit CESIUM_ION_TOKEN).
    environment:
      - NODE_ENV=development
      - VITE_API_BASE_URL=http://klima-back:3000
    networks:
      - klima-net

volumes:
  node-modules:

networks:
  klima-net:
    name: klima-net
    external: true
