name: klima-training

# Build partagé (une seule image) : entraînement GPU + smoke-test torch sans GPU obligatoire.
x-training-build: &training-build
  context: ..
  dockerfile: docker/Dockerfile

services:
  klima-training:
    container_name: klima-training
    build: *training-build
    gpus: all
    working_dir: /app/training
    volumes:
      - ../../:/app
    environment:
      - PYTHONPATH=/app
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
    shm_size: "8g"
    command:
      - python
      - -m
      - training.src.model.train
      - --config
      - configs/default.yaml

  # Smoke-test PyTorch + loss PINN (pas besoin de GPU ; même image que l’entraînement).
  klima-training-verify:
    container_name: klima-training-verify
    build: *training-build
    working_dir: /app
    volumes:
      - ../../:/app
    environment:
      - PYTHONPATH=/app
    command: [python, training/docker/verify_training_env.py]
