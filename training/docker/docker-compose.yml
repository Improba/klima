# GPU: NVIDIA Container Toolkit + driver. Uses `runtime: nvidia` (legacy layout, same
# idea as separate nvidia overlays). If Docker errors with "unknown runtime: nvidia",
# remove the `runtime:` line — `deploy.resources` alone is enough on many recent installs.
name: klima-training

services:
  klima-training:
    container_name: klima-training
    build:
      context: ..
      dockerfile: docker/Dockerfile
    runtime: nvidia
    # Monorepo root on PYTHONPATH so `training.src.model` resolves; cwd = training/ for configs/data paths
    working_dir: /app/training
    volumes:
      - ../../:/app
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, compute, utility]
    environment:
      - PYTHONPATH=/app
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    shm_size: "8g"
    command:
      - python
      - -m
      - training.src.model.train
      - --config
      - configs/default.yaml
