name: klima

services:
  # PyTorch FNO inference (trained .pt + norm_params). Opt-in: profile "infer" or ./scripts/run.sh dev-infer
  klima-infer:
    profiles:
      - infer
    build:
      context: ../../training/infer_server
      dockerfile: Dockerfile
    container_name: klima-infer
    ports:
      - "8001:8000"
    working_dir: /app/repo/training/infer_server
    volumes:
      - ../../:/app/repo:ro
      - ../../training/checkpoints:/checkpoints:ro
    environment:
      - PYTHONPATH=/app/repo
      - KLIMA_FNO_CHECKPOINT=/checkpoints/best_model.pt
      - KLIMA_FNO_NORM=/checkpoints/norm_params.json
    networks:
      - klima-net

  klima-back:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    container_name: klima-back
    ports:
      - "3000:3000"
    volumes:
      - ../:/app
      - cargo-cache:/usr/local/cargo/registry
      - target-cache:/app/target
    environment:
      - RUST_LOG=${RUST_LOG:-klima_api=debug,tower_http=debug}
      - DATABASE_URL=${DATABASE_URL:-postgres://klima:klima@klima-db:5432/klima}
      # ONNX mock ou graphe réel sous back/models/ (voir back/models/README.md)
      - KLIMA_MODEL_PATH=${KLIMA_MODEL_PATH:-/app/models/klima.onnx}
      - KLIMA_NORM_PATH=${KLIMA_NORM_PATH:-/app/models/norm_params.json}
      # Vide par défaut : pas d’appel HTTP au sidecar → ONNX puis mock. Avec profile infer : ./scripts/run.sh dev-infer
      - KLIMA_FNO_URL=${KLIMA_FNO_URL:-}
      - KLIMA_CACHE_SIZE=${KLIMA_CACHE_SIZE:-128}
    depends_on:
      klima-db:
        condition: service_healthy
    networks:
      - klima-net

  klima-db:
    image: postgres:16-bookworm
    container_name: klima-db
    environment:
      POSTGRES_DB: klima
      POSTGRES_USER: klima
      POSTGRES_PASSWORD: klima
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U klima"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - klima-net

volumes:
  cargo-cache:
  target-cache:
  pgdata:

networks:
  klima-net:
    name: klima-net
    external: true
